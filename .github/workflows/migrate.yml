name: Supabase Migration

on:
  push:
    branches: [main]

jobs:
  migrate:
    name: Apply Supabase Schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        run: |
          npm install -g supabase
          supabase --version

      - name: Link project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase login --token $SUPABASE_ACCESS_TOKEN
          supabase link --project-ref jogjbuoucnbzuoatgwgd --password ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Apply migrations
        run: supabase db push --db-url "postgresql://postgres:${{ secrets.SUPABASE_DB_PASSWORD }}@db.jogjbuoucnbzuoatgwgd.supabase.co:5432/postgres?sslmode=require"

      - name: Apply seed
        run: |
          supabase db seed --db-url "postgresql://postgres:${{ secrets.SUPABASE_DB_PASSWORD }}@db.jogjbuoucnbzuoatgwgd.supabase.co:5432/postgres?sslmode=require" --file supabase/migrations/002_seed_data.sql || true
