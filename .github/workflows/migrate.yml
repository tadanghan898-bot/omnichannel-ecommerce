name: Supabase Migration

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [supabase-migrate]

jobs:
  migrate:
    name: Apply Supabase Schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install psycopg2
        run: pip install psycopg2-binary

      - name: Apply Supabase schema
        env:
          SUPABASE_DB_PASSWORD: ${{ vars.SUPABASE_DB_PASSWORD }}
        run: |
          python3 << 'EOF'
import psycopg2, os

DB_PASS = os.environ.get('SUPABASE_DB_PASSWORD', '')
URL = f'postgresql://postgres:{DB_PASS}@db.jogjbuoucnbzuoatgwgd.supabase.co:5432/postgres'

conn = psycopg2.connect(URL)
conn.autocommit = True
cur = conn.cursor()

with open('supabase/migrations/001_init_schema.sql', 'r', encoding='utf-8') as f:
    sql = f.read()

ok = fail = 0
for stmt in [s.strip() for s in sql.split(';') if s.strip()]:
    if stmt.startswith('CREATE') or stmt.startswith('ALTER') or stmt.startswith('INSERT') or 'TRIGGER' in stmt:
        try:
            cur.execute(stmt)
            ok += 1
        except Exception as e:
            if 'already exists' not in str(e).lower() and 'duplicate' not in str(e).lower():
                print(f'WARN: {str(e)[:100]}')
                fail += 1

print(f'Schema: {ok} OK, {fail} warnings')

with open('supabase/migrations/002_seed_data.sql', 'r', encoding='utf-8') as f:
    for stmt in [s.strip() for s in f.read().split(';') if s.strip()]:
        if stmt.startswith('INSERT'):
            try:
                cur.execute(stmt)
            except Exception as e:
                if 'duplicate' not in str(e).lower():
                    print(f'Seed WARN: {str(e)[:100]}')

print('Seed: applied')
cur.close()
conn.close()
print('SUPABASE MIGRATION SUCCESS')
EOF

      - name: Verify tables
        env:
          SUPABASE_DB_PASSWORD: ${{ vars.SUPABASE_DB_PASSWORD }}
        run: |
          python3 -c "
import psycopg2, os
DB_PASS = os.environ.get('SUPABASE_DB_PASSWORD', '')
URL = f'postgresql://postgres:{DB_PASS}@db.jogjbuoucnbzuoatgwgd.supabase.co:5432/postgres'
conn = psycopg2.connect(URL)
cur = conn.cursor()
cur.execute(\"SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = 'public'\")
count = cur.fetchone()[0]
print(f'Tables created: {count}')
if count > 0:
    print('\\nTables:')
    cur.execute('SELECT table_name FROM information_schema.tables WHERE table_schema = public ORDER BY table_name')
    for row in cur.fetchall():
        print(f'  - {row[0]}')
cur.close()
conn.close()
"
