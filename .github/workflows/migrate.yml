name: Supabase Migration

on:
  push:
    branches: [main]

jobs:
  migrate:
    name: Apply Supabase Schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Link project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          curl -fsSL https://github.com/supabase/cli/releases/download/v1.206.3/supabase_linux_amd64.tar.gz -o /tmp/supabase.tar.gz
          tar -xzf /tmp/supabase.tar.gz -C /usr/local/bin
          supabase --version
          echo "$SUPABASE_ACCESS_TOKEN" | supabase login --token stdin
          supabase projects link jogjbuoucnbzuoatgwgd

      - name: Apply migrations
        run: supabase db push --project-ref jogjbuoucnbzuoatgwgd --yes
