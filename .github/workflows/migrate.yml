name: Supabase Migration

on:
  push:
    branches: [main]

jobs:
  migrate:
    name: Apply Supabase Schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply schema migration
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          TOKEN="$SUPABASE_ACCESS_TOKEN"
          PROJECT="peznevsvvmtdhafursvd"
          python3 << 'PYEOF'
import subprocess, json

token = "${{ secrets.SUPABASE_ACCESS_TOKEN }}"
project = "peznevsvvmtdhafursvd"

def sql(q):
    r = subprocess.run([
        "curl", "-s", "-X", "POST",
        f"https://api.supabase.com/v1/projects/{project}/database/query",
        "-H", f"Authorization: Bearer {token}",
        "-H", "Content-Type: application/json",
        "-H", f"apikey: {token}",
        "-d", json.dumps({"query": q})
    ], capture_output=True, text=True, timeout=30)
    return r.returncode == 0

# Read and execute schema
with open("supabase/migrations/001_init_schema.sql") as f:
    content = f.read()

ok = fail = 0
for stmt in content.split(";"):
    s = stmt.strip()
    if not s or s.startswith("--"):
        continue
    if sql(s):
        ok += 1
    else:
        fail += 1
    if (ok + fail) % 20 == 0:
        print(f"Progress: {ok} ok, {fail} fail")

print(f"Schema migration: {ok} ok, {fail} failed")

# Seed data
with open("supabase/migrations/002_seed_data.sql") as f:
    content = f.read()

ok = fail = 0
for stmt in content.split(";"):
    s = stmt.strip()
    if not s or s.startswith("--") or not s.startswith("INSERT"):
        continue
    if sql(s):
        ok += 1
    else:
        fail += 1

print(f"Seed data: {ok} ok, {fail} failed")

# Verify
r = subprocess.run([
    "curl", "-s", "-X", "POST",
    f"https://api.supabase.com/v1/projects/{project}/database/query",
    "-H", f"Authorization: Bearer {token}",
    "-H", "Content-Type: application/json",
    "-H", f"apikey: {token}",
    "-d", json.dumps({"query": "SELECT COUNT(*) as cnt FROM information_schema.tables WHERE table_schema = 'public'"})
], capture_output=True, text=True, timeout=30)
print(f"Result: {r.stdout}")
PYEOF
