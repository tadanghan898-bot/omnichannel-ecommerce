name: Supabase Migration

on:
  push:
    branches: [main]

jobs:
  migrate:
    name: Apply Supabase Schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v3
        with:
          version: 1.206.3

      - name: Link project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: echo "$SUPABASE_ACCESS_TOKEN" | supabase login --token stdin && supabase projects link jogjbuoucnbzuoatgwgd

      - name: Apply migrations
        run: supabase db push --project-ref jogjbuoucnbzuoatgwgd --yes
