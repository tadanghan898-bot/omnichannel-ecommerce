name: Supabase Migration

on:
  push:
    branches: [main]

jobs:
  migrate:
    name: Apply Supabase Schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply migrations via Management API
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          PROJECT_REF="peznevsvvmtdhafursvd"
          TOKEN="$SUPABASE_ACCESS_TOKEN"

          migrate_sql() {
            curl -s -X POST "https://api.supabase.com/v1/projects/${PROJECT_REF}/database/query" \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Content-Type: application/json" \
              -H "apikey: ${TOKEN}" \
              -d "{\"query\":\"$1\"}" > /dev/null 2>&1
          }

          # Run 001_init_schema.sql
          echo "Applying schema migration..."
          ok=0 fail=0
          while IFS= read -r stmt; do
            stmt=$(echo "$stmt" | sed 's/[[:space:]]\+/ /g' | xargs)
            [[ -z "$stmt" || "$stmt" == --* ]] && continue
            if migrate_sql "$stmt"; then
              ok=$((ok+1))
            else
              # Retry on error (some statements need special handling)
              migrate_sql "$stmt" 2>/dev/null && ok=$((ok+1)) || fail=$((fail+1))
            fi
            [[ $((ok+fail)) % 20 -eq 0 ]] && echo "  Progress: $ok executed"
          done < <(sed 's/;[[:space:]]*/;\n/g' supabase/migrations/001_init_schema.sql)
          echo "Schema: $ok OK, $fail failed"

          # Run 002_seed_data.sql
          echo "Applying seed data..."
          ok=0 fail=0
          while IFS= read -r stmt; do
            stmt=$(echo "$stmt" | sed 's/[[:space:]]\+/ /g' | xargs)
            [[ -z "$stmt" || "$stmt" == --* ]] && continue
            migrate_sql "$stmt" 2>/dev/null && ok=$((ok+1)) || fail=$((fail+1))
          done < <(sed 's/;[[:space:]]*/;\n/g' supabase/migrations/002_seed_data.sql)
          echo "Seed: $ok OK, $fail failed"

          # Verify
          echo "Verifying tables..."
          curl -s -X POST "https://api.supabase.com/v1/projects/${PROJECT_REF}/database/query" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            -H "apikey: ${TOKEN}" \
            -d '{"query":"SELECT COUNT(*) as cnt FROM information_schema.tables WHERE table_schema = '\''public'\''"}'
