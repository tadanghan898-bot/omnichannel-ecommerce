name: Supabase Migration

on:
  push:
    branches: [main]

jobs:
  migrate:
    name: Apply Supabase Schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI v2
        run: |
          curl -fsSL https://github.com/supabase/cli/releases/download/v2.84.2/supabase_linux_amd64.tar.gz -o /tmp/supabase.tar.gz
          tar -xzf /tmp/supabase.tar.gz -C /usr/local/bin
          supabase --version

      - name: Apply migrations
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          python3 -c "
          import urllib.parse
          pwd = urllib.parse.quote('${{ secrets.SUPABASE_DB_PASSWORD }}', safe='')
          db_url = f'postgresql://postgres:{pwd}@db.jogjbuoucnbzuoatgwgd.supabase.co:5432/postgres'
          with open('/tmp/db_url.txt', 'w') as f:
              f.write(db_url)
          print('DB URL prepared')
          "
          supabase db push --db-url "$(cat /tmp/db_url.txt)" --yes
