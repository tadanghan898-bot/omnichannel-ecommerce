name: Run Supabase Migration

on:
  workflow_dispatch:
    inputs:
      db_password:
        description: 'Database password'
        required: true
        type: password

jobs:
  migrate:
    name: Apply Supabase Schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install psycopg2
        run: pip install psycopg2-binary

      - name: Run migration
        env:
          SUPABASE_DATABASE_URL: postgresql://postgres:${{ inputs.db_password }}@db.jogjbuoucnbzuoatgwgd.supabase.co:5432/postgres
        run: |
          python3 << 'EOF'
import psycopg2, os

conn = psycopg2.connect(os.environ['SUPABASE_DATABASE_URL'])
conn.autocommit = True
cur = conn.cursor()

# Apply schema
with open('supabase/migrations/001_init_schema.sql', 'r', encoding='utf-8') as f:
    sql = f.read()

statements = [s.strip() for s in sql.split(';') if s.strip()]
ok = fail = 0
for stmt in statements:
    if stmt.startswith('CREATE') or stmt.startswith('ALTER') or stmt.startswith('INSERT'):
        try:
            cur.execute(stmt)
            ok += 1
        except Exception as e:
            msg = str(e).lower()
            if 'already exists' not in msg and 'duplicate' not in msg:
                print(f'WARN: {stmt[:50]}... {e}')
                fail += 1

print(f'Schema: {ok} succeeded, {fail} warnings')

# Seed data
with open('supabase/migrations/002_seed_data.sql', 'r', encoding='utf-8') as f:
    seed = f.read()

for stmt in [s.strip() for s in seed.split(';') if s.strip()]:
    if stmt.startswith('INSERT'):
        try:
            cur.execute(stmt)
        except Exception as e:
            if 'duplicate' not in str(e).lower():
                print(f'Seed WARN: {e}')

print('Migration complete!')
cur.close()
conn.close()
EOF

      - name: Verify tables
        env:
          SUPABASE_DATABASE_URL: postgresql://postgres:${{ inputs.db_password }}@db.jogjbuoucnbzuoatgwgd.supabase.co:5432/postgres
        run: |
          python3 -c "
import psycopg2, os
conn = psycopg2.connect(os.environ['SUPABASE_DATABASE_URL'])
cur = conn.cursor()
cur.execute(\"SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = 'public'\")
print(f'Tables in database: {cur.fetchone()[0]}')
cur.execute('SELECT table_name FROM information_schema.tables WHERE table_schema = public ORDER BY table_name')
for row in cur.fetchall():
    print(f'  - {row[0]}')
cur.close()
conn.close()
"
