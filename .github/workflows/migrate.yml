name: Supabase Migration

on:
  push:
    branches: [main]

jobs:
  migrate:
    name: Apply Supabase Schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install psycopg2
        run: pip install psycopg2-binary

      - name: Check files exist
        run: ls -la supabase/migrations/

      - name: Run migration
        env:
          DB_PASS: ${{ vars.SUPABASE_DB_PASSWORD }}
        run: python3 migrate_supabase.py

      - name: Verify tables
        run: |
          python3 -c "
import psycopg2, os
db_pass = os.environ.get('DB_PASS', '')
url = f'postgresql://postgres:{db_pass}@db.jogjbuoucnbzuoatgwgd.supabase.co:5432/postgres'
conn = psycopg2.connect(url)
cur = conn.cursor()
cur.execute(\"SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = 'public'\")
count = cur.fetchone()[0]
print(f'Tables created: {count}')
cur.close()
conn.close()
"
