name: Supabase Migration

on:
  push:
    branches: [main]

jobs:
  migrate:
    name: Apply Supabase Schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI v2
        run: |
          curl -fsSL https://github.com/supabase/cli/releases/download/v2.84.2/supabase_linux_amd64.tar.gz -o /tmp/supabase.tar.gz
          tar -xzf /tmp/supabase.tar.gz -C /usr/local/bin
          supabase --version

      - name: Apply migrations via direct DB connection
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          python3 -c "
import urllib.parse
pwd = '${{ secrets.SUPABASE_DB_PASSWORD }}'
encoded = urllib.parse.quote(pwd, safe='')
db_url = f'postgresql://postgres:{encoded}@db.peznevsvvmtdhafursvd.supabase.co:5432/postgres'
with open('/tmp/db_url.txt', 'w') as f:
    f.write(db_url)
print('DB URL ready')
"
          supabase db push --db-url "$(cat /tmp/db_url.txt)" --project-ref peznevsvvmtdhafursvd --yes
