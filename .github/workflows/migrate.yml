name: Supabase Migration

on:
  push:
    branches: [main]

jobs:
  migrate:
    name: Apply Supabase Schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install psycopg2
        run: pip install psycopg2-binary

      - name: Check files
        run: |
          ls -la
          ls -la supabase/migrations/

      - name: Run migration
        env:
          DB_PASS: ${{ vars.SUPABASE_DB_PASSWORD }}
        run: python3 migrate_supabase.py

      - name: Verify tables
        env:
          DB_PASS: ${{ vars.SUPABASE_DB_PASSWORD }}
        run: python3 verify_supabase.py
