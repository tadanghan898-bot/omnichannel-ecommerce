name: Deploy to Vercel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: |
          cd frontend && npm ci

      - name: Build frontend
        run: |
          cd frontend && npm run build
        env:
          VITE_API_URL: /api
          VITE_SUPABASE_URL: https://peznevsvvmtdhafursvd.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBlem5ldnN2dm10ZGhhZnVyc3ZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwNTgyNjEsImV4cCI6MjA5MTYzNDI2MX0.H9Hfu80epDg3iijutxBg6ccmBRPl-ubKa84ZYkuAzl0

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: .
          vercel-args: --prod
        env:
          SUPABASE_DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_URL: https://peznevsvvmtdhafursvd.supabase.co
          SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBlem5ldnN2dm10ZGhhZnVyc3ZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwNTgyNjEsImV4cCI6MjA5MTYzNDI2MX0.H9Hfu80epDg3iijutxBg6ccmBRPl-ubKa84ZYkuAzl0
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
          SECRET_KEY: supersecret-key-change-in-production
